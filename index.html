<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeespares VMS — Video Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #0A8A61;
    --green-light: #0fb578;
    --green-dark: #076b4b;
    --green-glow: rgba(10,138,97,0.18);
    --bg: #080e0c;
    --bg2: #0d1714;
    --bg3: #111e1a;
    --surface: #152820;
    --surface2: #1a3028;
    --border: rgba(10,138,97,0.2);
    --border2: rgba(10,138,97,0.35);
    --text: #e8f5f0;
    --text2: #9dbfb5;
    --text3: #5a8a7c;
    --red: #ff4757;
    --amber: #ffa502;
    --blue: #1e90ff;
    --radius: 12px;
    --radius-lg: 18px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body,#root { height:100%; background:var(--bg); color:var(--text); font-family:'Sora',sans-serif; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--green-dark); border-radius:4px; }

  /* AUTH */
  .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(10,138,97,0.12) 0%, transparent 70%), var(--bg); }
  .auth-card { width:440px; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg);
    padding:44px 40px; box-shadow:0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(10,138,97,0.08); }
  .auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
  .auth-logo-icon { width:44px; height:44px; background:var(--green); border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:22px; }
  .auth-logo-text { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
  .auth-logo-sub { font-size:11px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; }
  .auth-title { font-size:26px; font-weight:700; margin-bottom:6px; letter-spacing:-0.5px; }
  .auth-sub { color:var(--text2); font-size:14px; margin-bottom:28px; }
  .form-group { margin-bottom:18px; }
  .form-label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:8px; letter-spacing:0.5px; text-transform:uppercase; }
  .form-input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius);
    padding:12px 16px; color:var(--text); font-family:'Sora',sans-serif; font-size:14px; outline:none; transition:all .2s; }
  .form-input:focus { border-color:var(--green); box-shadow:0 0 0 3px var(--green-glow); }
  .form-input::placeholder { color:var(--text3); }
  .form-select { appearance:none; cursor:pointer; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 20px; border-radius:var(--radius); border:none; cursor:pointer;
    font-family:'Sora',sans-serif; font-size:14px; font-weight:600; transition:all .18s; }
  .btn-primary { background:var(--green); color:#fff; width:100%; padding:14px; font-size:15px; }
  .btn-primary:hover { background:var(--green-light); transform:translateY(-1px); box-shadow:0 8px 24px rgba(10,138,97,0.35); }
  .btn-primary:active { transform:translateY(0); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border2); }
  .btn-secondary:hover { background:var(--surface); border-color:var(--green); }
  .btn-danger { background:rgba(255,71,87,0.15); color:var(--red); border:1px solid rgba(255,71,87,0.3); }
  .btn-danger:hover { background:rgba(255,71,87,0.25); }
  .btn-sm { padding:8px 14px; font-size:12px; }
  .btn-ghost { background:transparent; color:var(--text2); }
  .btn-ghost:hover { color:var(--text); background:var(--surface); }
  .auth-switch { text-align:center; margin-top:22px; font-size:13px; color:var(--text2); }
  .auth-link { color:var(--green-light); cursor:pointer; font-weight:600; }
  .auth-link:hover { text-decoration:underline; }

  /* LAYOUT */
  .app { display:flex; height:100vh; overflow:hidden; }
  .sidebar { width:240px; background:var(--bg2); border-right:1px solid var(--border);
    display:flex; flex-direction:column; flex-shrink:0; }
  .sidebar-logo { padding:22px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .logo-badge { width:36px; height:36px; background:var(--green); border-radius:8px;
    display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .logo-name { font-size:15px; font-weight:700; line-height:1.2; }
  .logo-tag { font-size:10px; color:var(--green-light); font-weight:600; letter-spacing:0.5px; }
  .sidebar-nav { flex:1; padding:14px 10px; overflow-y:auto; }
  .nav-section { margin-bottom:22px; }
  .nav-section-title { font-size:10px; color:var(--text3); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:0 10px 8px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:9px;
    cursor:pointer; color:var(--text2); font-size:13.5px; font-weight:500; transition:all .15s; margin-bottom:2px; }
  .nav-item:hover { background:var(--surface); color:var(--text); }
  .nav-item.active { background:var(--green-glow); color:var(--green-light); border:1px solid rgba(10,138,97,0.25); }
  .nav-icon { font-size:16px; width:20px; text-align:center; }
  .sidebar-bottom { padding:14px; border-top:1px solid var(--border); }
  .user-pill { display:flex; align-items:center; gap:10px; padding:10px 12px;
    background:var(--surface); border-radius:10px; cursor:pointer; }
  .user-avatar { width:32px; height:32px; background:var(--green-dark); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0; }
  .user-name { font-size:13px; font-weight:600; }
  .user-plan { font-size:11px; color:var(--green-light); font-weight:600; }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .topbar { padding:16px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;
    background:var(--bg2); }
  .topbar-title { font-size:18px; font-weight:700; }
  .topbar-actions { display:flex; align-items:center; gap:10px; }
  .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:0.3px; }
  .badge-green { background:rgba(10,138,97,0.2); color:var(--green-light); border:1px solid rgba(10,138,97,0.3); }
  .badge-red { background:rgba(255,71,87,0.15); color:var(--red); border:1px solid rgba(255,71,87,0.3); }
  .badge-amber { background:rgba(255,165,2,0.15); color:var(--amber); border:1px solid rgba(255,165,2,0.3); }
  .badge-blue { background:rgba(30,144,255,0.15); color:var(--blue); border:1px solid rgba(30,144,255,0.3); }

  .content { flex:1; overflow-y:auto; padding:28px; }

  /* RECORDING PAGE */
  .record-grid { display:grid; grid-template-columns:340px 1fr; gap:20px; height:100%; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; }
  .panel-title { font-size:14px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:18px; display:flex; align-items:center; gap:8px; }

  .scan-field { margin-bottom:16px; }
  .scan-label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
  .scan-input-wrap { position:relative; }
  .scan-input { width:100%; background:var(--bg3); border:2px solid var(--border2); border-radius:var(--radius);
    padding:13px 16px 13px 42px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; outline:none; transition:all .2s; }
  .scan-input:focus { border-color:var(--green); box-shadow:0 0 0 3px var(--green-glow); }
  .scan-input.active { border-color:var(--green-light); background:rgba(10,138,97,0.06); }
  .scan-input.done { border-color:rgba(10,138,97,0.5); }
  .scan-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--text3); }
  .scan-check { position:absolute; right:13px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--green-light); }

  .status-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:16px; }
  .status-row { display:flex; align-items:center; justify-content:space-between; font-size:13px; }
  .status-label { color:var(--text2); }
  .status-value { font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13px; }

  .rec-btn { width:100%; padding:15px; border-radius:var(--radius); border:none; cursor:pointer;
    font-family:'Sora',sans-serif; font-size:15px; font-weight:700; transition:all .18s; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:10px; }
  .rec-btn-start { background:linear-gradient(135deg, var(--green), var(--green-light)); color:#fff; }
  .rec-btn-start:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(10,138,97,0.4); }
  .rec-btn-stop { background:linear-gradient(135deg, #ff4757, #ff6b81); color:#fff; }
  .rec-btn-stop:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(255,71,87,0.35); }
  .rec-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none !important; }

  .video-panel { position:relative; background:#000; border-radius:var(--radius-lg); overflow:hidden;
    border:1px solid var(--border); aspect-ratio:16/9; }
  .video-panel video { width:100%; height:100%; object-fit:cover; }
  .video-overlay { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
  .rec-indicator { position:absolute; top:14px; left:14px; display:flex; align-items:center; gap:7px;
    background:rgba(0,0,0,0.7); border-radius:20px; padding:6px 12px; backdrop-filter:blur(8px); }
  .rec-dot { width:9px; height:9px; border-radius:50%; background:var(--red); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  .rec-text { font-size:12px; font-weight:700; color:#fff; letter-spacing:1px; }
  .rec-timer { position:absolute; top:14px; right:14px; background:rgba(0,0,0,0.7); border-radius:20px;
    padding:6px 14px; font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#fff; backdrop-filter:blur(8px); }
  .video-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text3); background:var(--bg3); gap:14px; }
  .video-placeholder-icon { font-size:52px; opacity:0.4; }
  .video-placeholder-text { font-size:14px; font-weight:500; }

  .ts-overlay { position:absolute; bottom:14px; left:14px; background:rgba(0,0,0,0.6);
    padding:4px 10px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(255,255,255,0.8); }

  /* DASHBOARD */
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px 22px;
    position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; right:0; width:80px; height:80px;
    background:radial-gradient(circle at top right, var(--green-glow), transparent); }
  .stat-icon { font-size:22px; margin-bottom:12px; }
  .stat-value { font-size:28px; font-weight:800; margin-bottom:4px; letter-spacing:-1px; }
  .stat-label { font-size:12px; color:var(--text2); font-weight:500; }
  .stat-change { font-size:11px; color:var(--green-light); margin-top:4px; font-weight:600; }

  /* TABLE */
  .table-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
  .table-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .table-title { font-size:15px; font-weight:700; }
  .search-wrap { position:relative; }
  .search-input { background:var(--bg3); border:1px solid var(--border2); border-radius:9px;
    padding:9px 14px 9px 36px; color:var(--text); font-family:'Sora',sans-serif; font-size:13px; outline:none; width:220px; transition:all .2s; }
  .search-input:focus { border-color:var(--green); box-shadow:0 0 0 2px var(--green-glow); }
  .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:14px; }
  table { width:100%; border-collapse:collapse; }
  th { padding:10px 22px; text-align:left; font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
  td { padding:14px 22px; font-size:13.5px; border-bottom:1px solid rgba(10,138,97,0.08); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface); }
  .mono { font-family:'JetBrains Mono',monospace; font-size:13px; }
  .thumb { width:52px; height:36px; background:var(--bg3); border-radius:6px; object-fit:cover;
    display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text3); flex-shrink:0; overflow:hidden; }

  /* SETTINGS */
  .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .settings-section { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; }
  .settings-title { font-size:15px; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
  .setting-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); }
  .setting-row:last-child { border-bottom:none; }
  .setting-info { flex:1; }
  .setting-name { font-size:13.5px; font-weight:600; margin-bottom:3px; }
  .setting-desc { font-size:12px; color:var(--text2); }
  .toggle { position:relative; width:46px; height:26px; flex-shrink:0; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; inset:0; background:var(--bg3); border:1px solid var(--border2);
    border-radius:26px; cursor:pointer; transition:.2s; }
  .toggle-slider::before { content:''; position:absolute; height:18px; width:18px; left:3px; bottom:3px;
    background:var(--text3); border-radius:50%; transition:.2s; }
  input:checked + .toggle-slider { background:var(--green); border-color:var(--green); }
  input:checked + .toggle-slider::before { transform:translateX(20px); background:#fff; }

  .storage-option { border:2px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    cursor:pointer; transition:all .15s; margin-bottom:10px; display:flex; align-items:flex-start; gap:12px; }
  .storage-option.selected { border-color:var(--green); background:rgba(10,138,97,0.06); }
  .storage-option-radio { width:18px; height:18px; border-radius:50%; border:2px solid var(--border2);
    flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:.15s; }
  .storage-option.selected .storage-option-radio { border-color:var(--green); background:var(--green); }
  .storage-option.selected .storage-option-radio::after { content:''; width:6px; height:6px; background:#fff; border-radius:50%; }
  .storage-option-title { font-size:13.5px; font-weight:700; margin-bottom:3px; }
  .storage-option-desc { font-size:12px; color:var(--text2); }

  /* PLANS */
  .plans-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .plan-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px 24px;
    position:relative; overflow:hidden; }
  .plan-card.popular { border-color:var(--green); box-shadow:0 0 40px rgba(10,138,97,0.15); }
  .plan-popular-badge { position:absolute; top:0; right:0; background:var(--green); color:#fff;
    font-size:10px; font-weight:800; padding:5px 12px; border-radius:0 var(--radius-lg) 0 var(--radius); letter-spacing:1px; }
  .plan-name { font-size:16px; font-weight:700; margin-bottom:6px; }
  .plan-price { font-size:34px; font-weight:800; letter-spacing:-1px; margin:12px 0; }
  .plan-price sup { font-size:18px; font-weight:600; margin-right:2px; vertical-align:super; }
  .plan-price span { font-size:14px; font-weight:500; color:var(--text2); }
  .plan-desc { font-size:13px; color:var(--text2); margin-bottom:20px; }
  .plan-features { list-style:none; margin-bottom:24px; }
  .plan-features li { display:flex; align-items:center; gap:8px; font-size:13px; padding:7px 0; border-bottom:1px solid rgba(10,138,97,0.08); }
  .plan-features li:last-child { border-bottom:none; }
  .feat-check { color:var(--green-light); font-size:14px; }
  .feat-x { color:var(--text3); font-size:14px; }

  /* ANALYTICS */
  .analytics-grid { display:grid; grid-template-columns:2fr 1fr; gap:20px; }
  .chart-area { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; }
  .chart-bars { display:flex; align-items:flex-end; gap:8px; height:160px; padding-top:10px; }
  .bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { width:100%; border-radius:5px 5px 0 0; transition:all .3s; cursor:pointer; position:relative; min-height:4px; }
  .bar:hover { opacity:0.85; }
  .bar-label { font-size:10px; color:var(--text3); font-weight:600; }
  .bar-val { font-size:11px; color:var(--text2); font-weight:700; }
  .donut-svg { display:block; }
  .progress-bar { height:8px; background:var(--bg3); border-radius:8px; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--green-light)); border-radius:8px; transition:width .5s; }
  .storage-info { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; }

  /* NOTIFICATION */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--border2);
    border-radius:var(--radius); padding:14px 18px; display:flex; align-items:center; gap:10px;
    font-size:13.5px; font-weight:500; box-shadow:0 16px 40px rgba(0,0,0,0.4); z-index:9999;
    animation:slideIn .3s ease; max-width:320px; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

  /* MISC */
  .divider { height:1px; background:var(--border); margin:20px 0; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:60px 20px; color:var(--text2); gap:12px; }
  .empty-icon { font-size:48px; opacity:0.3; }
  .empty-text { font-size:14px; }
  .chip { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px;
    font-size:11px; font-weight:700; }
  .chip-green { background:rgba(10,138,97,0.15); color:var(--green-light); }
  .chip-red { background:rgba(255,71,87,0.12); color:var(--red); }
  .chip-amber { background:rgba(255,165,2,0.12); color:var(--amber); }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg);
    padding:32px; width:480px; box-shadow:0 32px 80px rgba(0,0,0,0.5); }
  .modal-title { font-size:20px; font-weight:700; margin-bottom:6px; }
  .modal-sub { font-size:13px; color:var(--text2); margin-bottom:24px; }
  .modal-actions { display:flex; gap:10px; margin-top:24px; justify-content:flex-end; }

  @media(max-width:900px){
    .record-grid { grid-template-columns:1fr; }
    .stats-grid { grid-template-columns:repeat(2,1fr); }
    .plans-grid { grid-template-columns:1fr; }
    .settings-grid { grid-template-columns:1fr; }
    .sidebar { display:none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ============ MOCK DATA ============
const MOCK_VIDEOS = [
  { id:1, orderId:'ORD-2024-001234', awb:'AWB7891234560', date:'2025-03-24', duration:'02:14', size:'45MB', status:'saved', storage:'local' },

function AuthPage({ onLogin }) {
  const [mode,  setMode]  = useState('login');
  const [form,  setForm]  = useState({ name:'', email:'', password:'', confirmPassword:'' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const validate = () => {
    if (!form.email.trim()) return 'Email is required';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) return 'Enter a valid email address';
    if (!form.password) return 'Password is required';
    if (form.password.length < 6) return 'Password must be at least 6 characters';
    if (mode === 'signup') {
      if (!form.name.trim()) return 'Full name is required';
      if (form.password !== form.confirmPassword) return 'Passwords do not match';
    }
    return null;
  };

  const handle = () => {
    const err = validate();
    if (err) { setError(err); return; }
    setLoading(true); setError('');

    const users = DB.getUsers();

    if (mode === 'signup') {
      if (users[form.email]) { setError('This email is already registered. Please sign in.'); setLoading(false); return; }
      const now = Date.now();
      const newUser = {
        name: form.name.trim(),
        email: form.email.toLowerCase().trim(),
        password: btoa(form.password), // basic encoding (not production-safe, needs backend for real)
        role: form.email.toLowerCase() === ADMIN_EMAIL ? 'admin' : 'seller',
        plan: 'trial',
        trialStarted: now,
        trialExpiry: now + (7 * 24 * 60 * 60 * 1000),
        createdAt: now,
        videoCount: 0,
      };
      users[form.email.toLowerCase()] = newUser;
      DB.saveUsers(users);
      DB.saveSession(newUser);
      setTimeout(() => { setLoading(false); onLogin(newUser); }, 600);
    } else {
      const u = users[form.email.toLowerCase().trim()];
      if (!u) { setError('No account found with this email. Please sign up first.'); setLoading(false); return; }
      if (u.password !== btoa(form.password)) { setError('Incorrect password. Please try again.'); setLoading(false); return; }
      DB.saveSession(u);
      setTimeout(() => { setLoading(false); onLogin(u); }, 400);
    }
  };

  const f = (k,v) => { setForm(p=>({...p,[k]:v})); if(error) setError(''); };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">📦</div>
          <div><div className="auth-logo-text">Zeespares VMS</div><div className="auth-logo-sub">Video Management System</div></div>
        </div>
        <div className="auth-title">{mode==='login'?'Welcome back':'Create your account'}</div>
        <div className="auth-sub">{mode==='login'?'Sign in to your seller dashboard':'Start your 7-day free trial — no card required'}</div>

        {mode==='signup' && (
          <div className="form-group">
            <label className="form-label">Full Name</label>
            <input className="form-input" placeholder="e.g. Rahul Sharma" value={form.name} onChange={e=>f('name',e.target.value)} />
          </div>
        )}
        <div className="form-group">
          <label className="form-label">Email Address</label>
          <input className="form-input" type="email" placeholder="you@example.com" value={form.email} onChange={e=>f('email',e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handle()} />
        </div>
        <div className="form-group">
          <label className="form-label">Password</label>
          <input className="form-input" type="password" placeholder="Minimum 6 characters" value={form.password} onChange={e=>f('password',e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handle()} />
        </div>
        {mode==='signup' && (
          <div className="form-group">
            <label className="form-label">Confirm Password</label>
            <input className="form-input" type="password" placeholder="Re-enter password" value={form.confirmPassword} onChange={e=>f('confirmPassword',e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handle()} />
          </div>
        )}

        {error && (
          <div style={{background:'rgba(255,71,87,0.1)',border:'1px solid rgba(255,71,87,0.3)',borderRadius:9,
            padding:'10px 14px',marginBottom:14,fontSize:13,color:'var(--red)',fontWeight:500}}>
            ⚠️ {error}
          </div>
        )}

        <button className="btn btn-primary" onClick={handle} disabled={loading} style={{opacity:loading?0.7:1}}>
          {loading ? 'Please wait...' : mode==='login' ? 'Sign In →' : 'Start Free Trial →'}
        </button>

        {mode==='signup' && (
          <div style={{marginTop:14,padding:'12px',background:'rgba(10,138,97,0.08)',borderRadius:9,border:'1px solid rgba(10,138,97,0.2)',fontSize:12,color:'var(--text2)'}}>
            🎉 <strong style={{color:'var(--green-light)'}}>7 days free</strong> — 100 videos included. No credit card needed.
          </div>
        )}

        <div className="auth-switch">
          {mode==='login'
            ? <>Don't have an account? <span className="auth-link" onClick={()=>{setMode('signup');setError('');}}>Sign up free</span></>
            : <>Already have an account? <span className="auth-link" onClick={()=>{setMode('login');setError('');}}>Sign in</span></>}
        </div>
      </div>
    </div>
  );
}

function RecordingPage({ user, toast, driveToken, driveEmail, onVideoSaved }) {
  const [orderId,     setOrderId]     = useState('');
  const [awb,         setAwb]         = useState('');
  const [phase,       setPhase]       = useState('idle');
  const [timer,       setTimer]       = useState(0);
  const [currentTime, setCurrentTime] = useState(new Date());
  const [folderName,  setFolderName]  = useState(localStorage.getItem('vms_folder_name')||'');
  const [lastSaved,   setLastSaved]   = useState('');
  const [savedVideos, setSavedVideos] = useState(() => DB.getVideos(user.email).slice(0,10));
  const [camError,    setCamError]    = useState('');

  const videoRef        = useRef(null);
  const streamRef       = useRef(null);
  const recorderRef     = useRef(null);
  const chunksRef       = useRef([]);
  const timerRef        = useRef(null);
  const folderHandleRef = useRef(null);
  const orderRef        = useRef(null);
  const awbRef          = useRef(null);

  // Check if recording is allowed
  const canRecord = () => {
    if (user.plan === 'trial') {
      if (Date.now() > user.trialExpiry) return { ok:false, reason:'Your free trial has expired. Please upgrade.' };
      if (user.videoCount >= 100) return { ok:false, reason:'You have used all 100 trial videos. Please upgrade.' };
    }
    if (user.plan === 'pro' && user.videoCount >= 500) return { ok:false, reason:'Monthly limit of 500 videos reached.' };
    return { ok: true };
  };

  useEffect(() => {
    const t = setInterval(() => setCurrentTime(new Date()), 1000);
    setTimeout(() => orderRef.current && orderRef.current.focus(), 200);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (phase==='recording') timerRef.current = setInterval(()=>setTimer(t=>t+1),1000);
    else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  }, [phase]);

  useEffect(() => {
    const el = videoRef.current;
    if (!el) return;
    if (phase==='recording' && streamRef.current) { el.srcObject=streamRef.current; el.play().catch(()=>{}); }
    else if (phase==='idle') el.srcObject = null;
  }, [phase]);

  const selectFolder = async () => {
    if (!window.showDirectoryPicker) { toast('Requires Chrome or Edge browser','error'); return; }
    try {
      const h = await window.showDirectoryPicker({mode:'readwrite'});
      folderHandleRef.current=h; setFolderName(h.name);
      localStorage.setItem('vms_folder_name', h.name);
      toast(`Folder selected: "${h.name}"`, 'success');
    } catch(e) { if(e.name!=='AbortError') toast('Cancelled','error'); }
  };

  const startRecording = async (oid) => {
    const check = canRecord();
    if (!check.ok) { toast(check.reason, 'error'); return; }
    setCamError('');
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720}},audio:true});
    } catch(e) {
      setCamError('Camera access denied. Click the camera icon in the browser address bar and allow access.');
      toast('Camera permission required','error'); return;
    }
    streamRef.current = stream; chunksRef.current = [];
    let mimeType = 'video/webm;codecs=vp8,opus';
    if(!MediaRecorder.isTypeSupported(mimeType)) mimeType='video/webm';
    if(!MediaRecorder.isTypeSupported(mimeType)) mimeType='';
    const rec = new MediaRecorder(stream, mimeType?{mimeType}:{});
    rec.ondataavailable = e => { if(e.data&&e.data.size>0) chunksRef.current.push(e.data); };
    rec.start(500); recorderRef.current=rec;
    setTimer(0); setPhase('recording');
    toast(`🔴 Recording: ${oid}`,'success');
    setTimeout(()=>awbRef.current&&awbRef.current.focus(),300);
  };

  const stopAndSave = (awbVal) => {
    const oid=orderId, dur=fmt(timer);
    setPhase('saving');
    const rec=recorderRef.current;
    if(!rec||rec.state==='inactive'){finalise(null,oid,awbVal,dur);return;}
    rec.onstop = async()=>{ const blob=new Blob(chunksRef.current,{type:'video/webm'}); await finalise(blob,oid,awbVal,dur); };
    rec.stop();
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
  };

  const finalise = async(blob,oid,awbVal,dur) => {
    const ts = new Date().toISOString().replace(/[:.]/g,'-');
    const filename = `${oid}__${awbVal}__${ts}.webm`;
    let storage = 'none';

    if(blob){
      if(driveToken){
        try { await uploadToDrive(blob,filename,driveToken); storage='drive'; setLastSaved(filename); toast(`Uploaded to Google Drive: ${filename}`,'success'); }
        catch(e){ toast('Drive upload failed, saving locally','error'); storage=await saveLocalOrDownload(blob,filename); }
      } else {
        storage = await saveLocalOrDownload(blob,filename);
      }
    }

    const sizeMB = blob?`${(blob.size/1024/1024).toFixed(1)}MB`:'—';
    const newVid = { id:Date.now(), orderId:oid, awb:awbVal, date:new Date().toISOString().split('T')[0], duration:dur, size:sizeMB, status:'saved', storage, filename };
    const allVideos = [newVid, ...DB.getVideos(user.email)];
    DB.saveVideos(user.email, allVideos);
    setSavedVideos(allVideos.slice(0,10));
    onVideoSaved(newVid);

    setOrderId('');setAwb('');setTimer(0);setPhase('idle');
    chunksRef.current=[];recorderRef.current=null;
    setTimeout(()=>orderRef.current&&orderRef.current.focus(),200);
  };

  const saveLocalOrDownload = async(blob,filename) => {
    if(folderHandleRef.current){
      try{
        const fh=await folderHandleRef.current.getFileHandle(filename,{create:true});
        const w=await fh.createWritable(); await w.write(blob); await w.close();
        setLastSaved(filename); toast(`Saved to "${folderHandleRef.current.name}"`,'success'); return 'local';
      }catch(e){}
    }
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),10000);
    if(!folderHandleRef.current) toast(`Downloaded: ${filename} — Select a folder to auto-save`,'info');
    else toast(`Downloaded: ${filename}`,'success');
    return 'download';
  };

  const uploadToDrive = async(blob,filename,token) => {
    let fid = sessionStorage.getItem('drive_folder_id');
    if(!fid){
      const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("name='Zeespares Packing Videos' and mimeType='application/vnd.google-apps.folder' and trashed=false")}`,{headers:{Authorization:`Bearer ${token}`}});
      const d=await r.json();
      if(d.files&&d.files.length>0){fid=d.files[0].id;}
      else{const cr=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({name:'Zeespares Packing Videos',mimeType:'application/vnd.google-apps.folder'})});const cd=await cr.json();fid=cd.id;}
      sessionStorage.setItem('drive_folder_id',fid);
    }
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify({name:filename,parents:[fid]})],{type:'application/json'}));
    form.append('file',blob,filename);
    const up=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${token}`},body:form});
    if(!up.ok) throw new Error('Upload failed');
    return up.json();
  };

  const onOrderKeyDown = e => { if(e.key==='Enter'&&orderId.trim().length>=3&&phase==='idle'){e.preventDefault();startRecording(orderId.trim());} };
  const onAwbKeyDown   = e => { if(e.key==='Enter'&&awb.trim().length>=3&&phase==='recording'){e.preventDefault();stopAndSave(awb.trim());} };
  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const isIdle=phase==='idle', isRec=phase==='recording', isSaving=phase==='saving';
  const storageLabel = driveToken?`📂 Google Drive (${driveEmail||''})`:folderName?`📁 ${folderName}`:'📥 Browser download';

  return (
    <div>
      {/* Storage bar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10,
        padding:'12px 18px',borderRadius:12,marginBottom:18,
        background:driveToken?'rgba(30,144,255,0.08)':folderName?'rgba(10,138,97,0.1)':'rgba(255,165,2,0.08)',
        border:`1px solid ${driveToken?'rgba(30,144,255,0.35)':folderName?'rgba(10,138,97,0.35)':'rgba(255,165,2,0.35)'}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18}}>{driveToken?'📂':folderName?'📁':'⚠️'}</span>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:driveToken?'var(--blue)':folderName?'var(--green-light)':'var(--amber)'}}>
              {driveToken?`Google Drive: ${driveEmail||'Connected'}`:folderName?`Folder: "${folderName}"`:'No save location set'}
            </div>
            <div style={{fontSize:11,color:'var(--text2)'}}>
              {driveToken?'Videos auto-upload to "Zeespares Packing Videos" in your Drive':
               folderName?(lastSaved?`Last: ${lastSaved.substring(0,40)}`:'Videos save directly to this folder'):
               'Connect Google Drive in Settings, or select a local folder'}
            </div>
          </div>
        </div>
        {!driveToken&&<button className="btn btn-secondary btn-sm" onClick={selectFolder}>{folderName?'🔄 Change Folder':'📂 Select Folder'}</button>}
      </div>

      <div className="record-grid" style={{alignItems:'start'}}>
        {/* LEFT */}
        <div className="panel">
          <div className="panel-title">📱 Scan &amp; Record</div>
          {camError&&<div style={{background:'rgba(255,71,87,0.1)',border:'1px solid rgba(255,71,87,0.3)',borderRadius:9,padding:'10px 14px',marginBottom:14,fontSize:12,color:'var(--red)',lineHeight:1.5}}>⚠️ {camError}</div>}

          <div className="scan-field">
            <div className="scan-label"><span>① Order ID</span>{isRec&&<span className="chip chip-green">✓ Scanned</span>}{isIdle&&<span style={{fontSize:11,color:'var(--text3)'}}>Scan barcode → Enter</span>}</div>
            <div className="scan-input-wrap">
              <span className="scan-icon">🔍</span>
              <input ref={orderRef} className={`scan-input${isRec||isSaving?' done':''}`}
                placeholder="Scan Order ID or type and press Enter..."
                value={orderId} onChange={e=>{if(phase==='idle')setOrderId(e.target.value);}}
                onKeyDown={onOrderKeyDown} disabled={!isIdle} />
              {(isRec||isSaving)&&<span className="scan-check">✓</span>}
            </div>
            {isIdle&&orderId.length>=3&&<button className="btn btn-primary btn-sm" style={{marginTop:8,width:'100%'}} onClick={()=>startRecording(orderId.trim())}>▶ Start Recording</button>}
          </div>

          <div className="scan-field">
            <div className="scan-label"><span>② AWB Number</span>{isSaving&&<span className="chip chip-green">✓ Scanned</span>}{isRec&&<span style={{fontSize:11,color:'var(--red)',fontWeight:700}}>● Recording...</span>}</div>
            <div className="scan-input-wrap">
              <span className="scan-icon">📦</span>
              <input ref={awbRef} className={`scan-input${isRec?' active':''}${isSaving?' done':''}`}

function VideosPage({ user, toast }) {
  const [search,      setSearch]      = useState('');
  const [dateFilter,  setDateFilter]  = useState('');
  const [deleteModal, setDeleteModal] = useState(null);
  const [videos,      setVideos]      = useState(()=>DB.getVideos(user.email));

  const filtered = videos.filter(v=>
    (v.orderId?.toLowerCase().includes(search.toLowerCase())||v.awb?.toLowerCase().includes(search.toLowerCase())) &&
    (!dateFilter||v.date===dateFilter)
  );

  const del = (id) => {
    const updated = videos.filter(v=>v.id!==id);
    setVideos(updated); DB.saveVideos(user.email, updated);
    toast('Video deleted','success'); setDeleteModal(null);
  };

  return (
    <div>
      <div className="table-wrap">
        <div className="table-header">
          <span className="table-title">All Recordings ({filtered.length})</span>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <input type="date" className="form-input" style={{padding:'8px 12px',fontSize:13,width:'auto'}} value={dateFilter} onChange={e=>setDateFilter(e.target.value)}/>
            <div className="search-wrap"><span className="search-icon">🔍</span>
              <input className="search-input" placeholder="Search Order ID or AWB..." value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
          </div>
        </div>
        {filtered.length===0
          ? <div className="empty-state"><div className="empty-icon">🎬</div><div className="empty-text">{videos.length===0?'No recordings yet':'No results found'}</div></div>
          : <table><thead><tr><th>Order ID</th><th>AWB</th><th>Date</th><th>Duration</th><th>Size</th><th>Storage</th><th>Actions</th></tr></thead>
            <tbody>{filtered.map(v=>(
              <tr key={v.id}>
                <td className="mono" style={{color:'var(--green-light)'}}>{v.orderId}</td>
                <td className="mono">{v.awb}</td>
                <td style={{color:'var(--text2)'}}>{v.date}</td>
                <td>{v.duration}</td>
                <td>{v.size}</td>
                <td><span className="chip chip-green">{v.storage}</span></td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>setDeleteModal(v.id)}>🗑</button></td>
              </tr>
            ))}</tbody></table>}
      </div>
      {deleteModal&&<div className="modal-backdrop" onClick={()=>setDeleteModal(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-title">Delete Recording?</div>
          <div className="modal-sub">This cannot be undone. The video metadata will be removed.</div>
          <div className="modal-actions">
            <button className="btn btn-secondary" onClick={()=>setDeleteModal(null)}>Cancel</button>
            <button className="btn btn-danger" onClick={()=>del(deleteModal)}>Delete</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ============================================================
function PlansPage({ user, toast, onUpgrade }) {
  const [loading, setLoading] = useState(null);

  const handleBuy = (plan) => {
    if (user.plan === plan.id) { toast('You are already on this plan','info'); return; }
    if (!window.Razorpay) { toast('Razorpay is loading, please try again in a moment','error'); return; }
    setLoading(plan.id);
    const options = {
      key: RAZORPAY_KEY,
      amount: plan.price * 100,
      currency: 'INR',
      name: 'Zeespares VMS',
      description: `${plan.name} Plan — ₹${plan.price}/month`,
      handler: (response) => {
        toast(`Payment successful! ID: ${response.razorpay_payment_id}`,'success');
        onUpgrade(plan.id);
        setLoading(null);
      },
      prefill: { name: user.name, email: user.email },
      notes: { plan: plan.id },
      theme: { color: '#0A8A61' },
      modal: { ondismiss: () => setLoading(null) }
    };
    const rzp = new window.Razorpay(options);
    rzp.on('payment.failed', r => { toast(`Payment failed: ${r.error.description}`,'error'); setLoading(null); });
    rzp.open();
  };

  return (
    <div>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{fontSize:28,fontWeight:800,marginBottom:8,letterSpacing:-0.5}}>Choose Your Plan</div>
        <div style={{color:'var(--text2)',fontSize:15}}>Protect every order. No more fake return losses.</div>
      </div>
      <div className="plans-grid">
        {PLANS_CONFIG.map(p=>(
          <div key={p.id} className={`plan-card${p.popular?' popular':''}`}>
            {p.popular&&<div className="plan-popular-badge">MOST POPULAR</div>}
            <div className="plan-name" style={{color:p.color}}>{p.name}</div>
            <div className="plan-price">
              {p.price===0?<>Free<span style={{display:'block',fontSize:14,fontWeight:500,color:'var(--text2)',marginTop:2}}>7 days trial</span></>
                :<><sup>{p.currency}</sup>{p.price.toLocaleString('en-IN')}<span>/mo</span></>}
            </div>
            <div className="plan-desc">{p.desc}</div>
            <ul className="plan-features">
              {p.features.map((f,i)=>(
                <li key={i}><span className={f.startsWith('✓')||!f.startsWith('✗')?'feat-check':'feat-x'}>{f.startsWith('✓')||f.startsWith('✗')?f[0]:'✓'}</span><span>{f.replace(/^[✓✗]\s*/,'')}</span></li>
              ))}
            </ul>
            {user.plan===p.id
              ? <button className="btn btn-secondary" style={{width:'100%'}} disabled>✓ Current Plan</button>
              : p.price===0
                ? <button className="btn btn-secondary" style={{width:'100%'}} disabled>Trial Active on Signup</button>
                : <button className="btn btn-primary" style={{background:p.color,width:'100%',opacity:loading===p.id?0.7:1}}
                    onClick={()=>handleBuy(p)} disabled={!!loading}>
                    {loading===p.id?'Opening payment...`':'💳 Subscribe — ₹'+p.price+'/mo'}
                  </button>}
          </div>
        ))}
      </div>
      <div style={{marginTop:28,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:18,padding:'22px 28px'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
          <span style={{fontSize:22}}>💳</span>
          <div><div style={{fontWeight:700,fontSize:15}}>Powered by Razorpay</div><div style={{fontSize:13,color:'var(--text2)'}}>100% secure · PCI DSS compliant · Trusted by 8M+ businesses in India</div></div>
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          {['UPI / GPay / PhonePe','Credit Card','Debit Card','Net Banking','Paytm','EMI'].map(m=><span key={m} className="chip chip-green">{m}</span>)}
        </div>
      </div>
      <div style={{marginTop:16,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:18,padding:'22px 28px'}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>💡 Why sellers need Zeespares VMS</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {[['🚫 Fake Returns','Customer claims wrong item sent — video proves what was packed'],
            ['📦 RTO Fraud','Courier marks delivered but customer denies — video is proof'],
            ['⚖️ Marketplace Disputes','Amazon/Flipkart disputes resolved faster with video evidence'],
            ['💰 Save Money','Average seller saves ₹5,000-20,000/month in fake claims']].map(([t,d],i)=>(
            <div key={i} style={{padding:'12px 14px',background:'var(--bg3)',borderRadius:9}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{t}</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>{d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ADMIN PAGE
// ============================================================
function AdminPage({ toast }) {
  const allUsers = Object.values(DB.getUsers());
  return (
    <div>
      <div className="stats-grid" style={{marginBottom:24}}>
        {[{icon:'👥',val:allUsers.length,label:'Total Users',sub:'Registered accounts'},
          {icon:'💰',val:`₹${allUsers.filter(u=>u.plan==='pro').length*999 + allUsers.filter(u=>u.plan==='business').length*2499}`,label:'MRR',sub:'Monthly recurring'},
          {icon:'📹',val:allUsers.reduce((s,u)=>s+(u.videoCount||0),0),label:'Total Videos',sub:'All users'},
          {icon:'🆓',val:allUsers.filter(u=>u.plan==='trial').length,label:'On Trial',sub:'Need conversion'},
        ].map((s,i)=>(
          <div className="stat-card" key={i}><div className="stat-icon">{s.icon}</div><div className="stat-value">{s.val}</div><div className="stat-label">{s.label}</div><div className="stat-change">{s.sub}</div></div>
        ))}
      </div>
      <div className="table-wrap">
        <div className="table-header"><span className="table-title">Registered Users ({allUsers.length})</span></div>
        {allUsers.length===0
          ? <div className="empty-state"><div className="empty-icon">👥</div><div className="empty-text">No users yet</div></div>
          : <table><thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Videos</th><th>Joined</th></tr></thead>
            <tbody>{allUsers.map((u,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{u.name}</td>
                <td style={{fontSize:12,color:'var(--text2)'}}>{u.email}</td>
                <td><span className={`badge ${u.plan==='business'?'badge-amber':u.plan==='pro'?'badge-green':'badge-blue'}`}>{u.plan.toUpperCase()}</span></td>
                <td className="mono">{u.videoCount||0}</td>
                <td style={{color:'var(--text2)'}}>{new Date(u.createdAt).toLocaleDateString('en-IN')}</td>
              </tr>
            ))}</tbody></table>}
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [user,       setUser]       = useState(()=>DB.getSession());
  const [page,       setPage]       = useState('dashboard');
  const [toastData,  setToastData]  = useState(null);
  const [driveToken, setDriveToken] = useState(()=>sessionStorage.getItem('drive_token')||'');
  const [driveEmail, setDriveEmail] = useState(()=>sessionStorage.getItem('drive_email')||'');

  const toast = (msg, type='success') => setToastData({msg, type, key:Date.now()});

  // Load Razorpay
  useEffect(()=>{
    if(!document.getElementById('rzp-script')){
      const s=document.createElement('script'); s.id='rzp-script';
      s.src='https://checkout.razorpay.com/v1/checkout.js'; s.async=true;
      document.head.appendChild(s);
    }
  },[]);

  // Handle Google OAuth callback
  useEffect(()=>{
    const hash=window.location.hash;
    if(hash&&hash.includes('access_token')){
      const p=new URLSearchParams(hash.substring(1));
      const token=p.get('access_token');
      if(token){
        fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{Authorization:`Bearer ${token}`}})
          .then(r=>r.json()).then(info=>{
            setDriveToken(token); setDriveEmail(info.email||'');
            sessionStorage.setItem('drive_token',token);
            sessionStorage.setItem('drive_email',info.email||'');
            toast(`Google Drive connected: ${info.email}`,'success');
          }).catch(()=>{ setDriveToken(token); sessionStorage.setItem('drive_token',token); toast('Google Drive connected!','success'); });
        window.history.replaceState({},document.title,window.location.pathname);
      }
    }
  },[]);

  const connectDrive = () => {
    const params=new URLSearchParams({client_id:GOOGLE_CLIENT_ID,redirect_uri:window.location.origin+window.location.pathname,response_type:'token',scope:GOOGLE_SCOPES,state:'drive'});
    window.location.href=`https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  };

  const disconnectDrive = () => {
    setDriveToken(''); setDriveEmail('');
    sessionStorage.removeItem('drive_token'); sessionStorage.removeItem('drive_email'); sessionStorage.removeItem('drive_folder_id');
    toast('Google Drive disconnected','success');
  };

  const handleVideoSaved = (newVid) => {
    const users=DB.getUsers();
    if(users[user.email]){
      users[user.email].videoCount=(users[user.email].videoCount||0)+1;
      DB.saveUsers(users);
      setUser(prev=>{const u={...prev,videoCount:(prev.videoCount||0)+1}; DB.saveSession(u); return u;});
    }
  };

  const handleUpgrade = (planId) => {
    const users=DB.getUsers();
    if(users[user.email]){ users[user.email].plan=planId; DB.saveUsers(users); }
    const updated={...user,plan:planId};
    setUser(updated); DB.saveSession(updated);
    setPage('dashboard');
  };

  const handleLogin = (u) => { setUser(u); setPage('dashboard'); };

  const handleLogout = () => { DB.clearSession(); setUser(null); setPage('dashboard'); };

  if(!user) return <AuthPage onLogin={handleLogin}/>;

  const isAdmin = user.role==='admin';
  const navItems = isAdmin ? [
    {id:'dashboard',icon:'🏠',label:'Dashboard'},
    {id:'admin',icon:'👑',label:'Admin Panel'},
    {id:'analytics',icon:'📊',label:'Analytics'},
    {id:'plans',icon:'💎',label:'Plans'},
  ] : [
    {id:'dashboard',icon:'🏠',label:'Dashboard'},
    {id:'record',icon:'🎬',label:'Record Video'},
    {id:'videos',icon:'📁',label:'My Videos'},
    {id:'analytics',icon:'📊',label:'Analytics'},
    {id:'settings',icon:'⚙️',label:'Settings'},
    {id:'plans',icon:'💎',label:'Upgrade'},
  ];

  const titles={dashboard:'Dashboard',record:'Record Video',videos:'My Videos',analytics:'Analytics',settings:'Settings',plans:'Plans & Pricing',admin:'Admin Panel'};
  const planCfg=PLANS_CONFIG.find(p=>p.id===user.plan)||PLANS_CONFIG[0];

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-badge">📦</div>
          <div><div className="logo-name">Zeespares</div><div className="logo-tag">VMS</div></div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-section-title">Navigation</div>
            {navItems.map(n=>(
              <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
                <span className="nav-icon">{n.icon}</span><span>{n.label}</span>
                {n.id==='plans'&&user.plan==='trial'&&<span className="badge badge-amber" style={{fontSize:10,padding:'2px 6px',marginLeft:'auto'}}>Trial</span>}
              </div>
            ))}
          </div>
          {driveToken&&<div style={{margin:'8px 10px 0',padding:'10px 12px',background:'rgba(30,144,255,0.1)',borderRadius:9,border:'1px solid rgba(30,144,255,0.3)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',marginBottom:2}}>📂 Drive Connected</div>
            <div style={{fontSize:10,color:'var(--text3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{driveEmail}</div>
          </div>}
        </div>
        <div className="sidebar-bottom">
          <div className="user-pill" onClick={()=>setPage('settings')}>
            <div className="user-avatar">{user.name[0].toUpperCase()}</div>
            <div><div className="user-name">{user.name.split(' ')[0]}</div><div className="user-plan">{planCfg.name.toUpperCase()}</div></div>
          </div>
          <button className="btn btn-ghost" style={{width:'100%',marginTop:8,fontSize:12,color:'var(--text3)'}} onClick={handleLogout}>Sign Out</button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{titles[page]}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
          </div>
          <div className="topbar-actions">
            {driveToken&&<span className="badge badge-blue">📂 Drive</span>}
            <span className={`badge ${user.plan==='business'?'badge-amber':user.plan==='pro'?'badge-green':'badge-blue'}`}>{planCfg.name.toUpperCase()}</span>
            {isAdmin&&<span className="badge badge-red">ADMIN</span>}
          </div>
        </div>
        <div className="content">
          {page==='dashboard' && <Dashboard user={user} navigate={setPage}/>}
          {page==='record'    && <RecordingPage user={user} toast={toast} driveToken={driveToken} driveEmail={driveEmail} onVideoSaved={handleVideoSaved}/>}
          {page==='videos'    && <VideosPage user={user} toast={toast}/>}
          {page==='analytics' && <AnalyticsPage user={user}/>}
          {page==='settings'  && <SettingsPage user={user} toast={toast} driveToken={driveToken} driveEmail={driveEmail} onDriveConnect={connectDrive} onDriveDisconnect={disconnectDrive}/>}
          {page==='plans'     && <PlansPage user={user} toast={toast} onUpgrade={handleUpgrade}/>}
          {page==='admin'     && <AdminPage toast={toast}/>}
        </div>
      </div>
      {toastData&&<Toast key={toastData.key} msg={toastData.msg} type={toastData.type} onClose={()=>setToastData(null)}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
