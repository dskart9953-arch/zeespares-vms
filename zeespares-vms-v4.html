<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeespares VMS — Video Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #0A8A61;
    --green-light: #0fb578;
    --green-dark: #076b4b;
    --green-glow: rgba(10,138,97,0.18);
    --bg: #080e0c;
    --bg2: #0d1714;
    --bg3: #111e1a;
    --surface: #152820;
    --surface2: #1a3028;
    --border: rgba(10,138,97,0.2);
    --border2: rgba(10,138,97,0.35);
    --text: #e8f5f0;
    --text2: #9dbfb5;
    --text3: #5a8a7c;
    --red: #ff4757;
    --amber: #ffa502;
    --blue: #1e90ff;
    --radius: 12px;
    --radius-lg: 18px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body,#root { height:100%; background:var(--bg); color:var(--text); font-family:'Sora',sans-serif; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--green-dark); border-radius:4px; }

  /* AUTH */
  .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(10,138,97,0.12) 0%, transparent 70%), var(--bg); }
  .auth-card { width:440px; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg);
    padding:44px 40px; box-shadow:0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(10,138,97,0.08); }
  .auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
  .auth-logo-icon { width:44px; height:44px; background:var(--green); border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:22px; }
  .auth-logo-text { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
  .auth-logo-sub { font-size:11px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; }
  .auth-title { font-size:26px; font-weight:700; margin-bottom:6px; letter-spacing:-0.5px; }
  .auth-sub { color:var(--text2); font-size:14px; margin-bottom:28px; }
  .form-group { margin-bottom:18px; }
  .form-label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:8px; letter-spacing:0.5px; text-transform:uppercase; }
  .form-input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius);
    padding:12px 16px; color:var(--text); font-family:'Sora',sans-serif; font-size:14px; outline:none; transition:all .2s; }
  .form-input:focus { border-color:var(--green); box-shadow:0 0 0 3px var(--green-glow); }
  .form-input::placeholder { color:var(--text3); }
  .form-select { appearance:none; cursor:pointer; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 20px; border-radius:var(--radius); border:none; cursor:pointer;
    font-family:'Sora',sans-serif; font-size:14px; font-weight:600; transition:all .18s; }
  .btn-primary { background:var(--green); color:#fff; width:100%; padding:14px; font-size:15px; }
  .btn-primary:hover { background:var(--green-light); transform:translateY(-1px); box-shadow:0 8px 24px rgba(10,138,97,0.35); }
  .btn-primary:active { transform:translateY(0); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border2); }
  .btn-secondary:hover { background:var(--surface); border-color:var(--green); }
  .btn-danger { background:rgba(255,71,87,0.15); color:var(--red); border:1px solid rgba(255,71,87,0.3); }
  .btn-danger:hover { background:rgba(255,71,87,0.25); }
  .btn-sm { padding:8px 14px; font-size:12px; }
  .btn-ghost { background:transparent; color:var(--text2); }
  .btn-ghost:hover { color:var(--text); background:var(--surface); }
  .auth-switch { text-align:center; margin-top:22px; font-size:13px; color:var(--text2); }
  .auth-link { color:var(--green-light); cursor:pointer; font-weight:600; }
  .auth-link:hover { text-decoration:underline; }

  /* LAYOUT */
  .app { display:flex; height:100vh; overflow:hidden; }
  .sidebar { width:240px; background:var(--bg2); border-right:1px solid var(--border);
    display:flex; flex-direction:column; flex-shrink:0; }
  .sidebar-logo { padding:22px 20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .logo-badge { width:36px; height:36px; background:var(--green); border-radius:8px;
    display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .logo-name { font-size:15px; font-weight:700; line-height:1.2; }
  .logo-tag { font-size:10px; color:var(--green-light); font-weight:600; letter-spacing:0.5px; }
  .sidebar-nav { flex:1; padding:14px 10px; overflow-y:auto; }
  .nav-section { margin-bottom:22px; }
  .nav-section-title { font-size:10px; color:var(--text3); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:0 10px 8px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:9px;
    cursor:pointer; color:var(--text2); font-size:13.5px; font-weight:500; transition:all .15s; margin-bottom:2px; }
  .nav-item:hover { background:var(--surface); color:var(--text); }
  .nav-item.active { background:var(--green-glow); color:var(--green-light); border:1px solid rgba(10,138,97,0.25); }
  .nav-icon { font-size:16px; width:20px; text-align:center; }
  .sidebar-bottom { padding:14px; border-top:1px solid var(--border); }
  .user-pill { display:flex; align-items:center; gap:10px; padding:10px 12px;
    background:var(--surface); border-radius:10px; cursor:pointer; }
  .user-avatar { width:32px; height:32px; background:var(--green-dark); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0; }
  .user-name { font-size:13px; font-weight:600; }
  .user-plan { font-size:11px; color:var(--green-light); font-weight:600; }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .topbar { padding:16px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;
    background:var(--bg2); }
  .topbar-title { font-size:18px; font-weight:700; }
  .topbar-actions { display:flex; align-items:center; gap:10px; }
  .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:0.3px; }
  .badge-green { background:rgba(10,138,97,0.2); color:var(--green-light); border:1px solid rgba(10,138,97,0.3); }
  .badge-red { background:rgba(255,71,87,0.15); color:var(--red); border:1px solid rgba(255,71,87,0.3); }
  .badge-amber { background:rgba(255,165,2,0.15); color:var(--amber); border:1px solid rgba(255,165,2,0.3); }
  .badge-blue { background:rgba(30,144,255,0.15); color:var(--blue); border:1px solid rgba(30,144,255,0.3); }

  .content { flex:1; overflow-y:auto; padding:28px; }

  /* RECORDING PAGE */
  .record-grid { display:grid; grid-template-columns:340px 1fr; gap:20px; height:100%; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; }
  .panel-title { font-size:14px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:18px; display:flex; align-items:center; gap:8px; }

  .scan-field { margin-bottom:16px; }
  .scan-label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
  .scan-input-wrap { position:relative; }
  .scan-input { width:100%; background:var(--bg3); border:2px solid var(--border2); border-radius:var(--radius);
    padding:13px 16px 13px 42px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; outline:none; transition:all .2s; }
  .scan-input:focus { border-color:var(--green); box-shadow:0 0 0 3px var(--green-glow); }
  .scan-input.active { border-color:var(--green-light); background:rgba(10,138,97,0.06); }
  .scan-input.done { border-color:rgba(10,138,97,0.5); }
  .scan-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--text3); }
  .scan-check { position:absolute; right:13px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--green-light); }

  .status-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:16px; }
  .status-row { display:flex; align-items:center; justify-content:space-between; font-size:13px; }
  .status-label { color:var(--text2); }
  .status-value { font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13px; }

  .rec-btn { width:100%; padding:15px; border-radius:var(--radius); border:none; cursor:pointer;
    font-family:'Sora',sans-serif; font-size:15px; font-weight:700; transition:all .18s; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:10px; }
  .rec-btn-start { background:linear-gradient(135deg, var(--green), var(--green-light)); color:#fff; }
  .rec-btn-start:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(10,138,97,0.4); }
  .rec-btn-stop { background:linear-gradient(135deg, #ff4757, #ff6b81); color:#fff; }
  .rec-btn-stop:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(255,71,87,0.35); }
  .rec-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none !important; }

  .video-panel { position:relative; background:#000; border-radius:var(--radius-lg); overflow:hidden;
    border:1px solid var(--border); aspect-ratio:16/9; }
  .video-panel video { width:100%; height:100%; object-fit:cover; }
  .video-overlay { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
  .rec-indicator { position:absolute; top:14px; left:14px; display:flex; align-items:center; gap:7px;
    background:rgba(0,0,0,0.7); border-radius:20px; padding:6px 12px; backdrop-filter:blur(8px); }
  .rec-dot { width:9px; height:9px; border-radius:50%; background:var(--red); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  .rec-text { font-size:12px; font-weight:700; color:#fff; letter-spacing:1px; }
  .rec-timer { position:absolute; top:14px; right:14px; background:rgba(0,0,0,0.7); border-radius:20px;
    padding:6px 14px; font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#fff; backdrop-filter:blur(8px); }
  .video-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text3); background:var(--bg3); gap:14px; }
  .video-placeholder-icon { font-size:52px; opacity:0.4; }
  .video-placeholder-text { font-size:14px; font-weight:500; }

  .ts-overlay { position:absolute; bottom:14px; left:14px; background:rgba(0,0,0,0.6);
    padding:4px 10px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(255,255,255,0.8); }

  /* DASHBOARD */
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px 22px;
    position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; right:0; width:80px; height:80px;
    background:radial-gradient(circle at top right, var(--green-glow), transparent); }
  .stat-icon { font-size:22px; margin-bottom:12px; }
  .stat-value { font-size:28px; font-weight:800; margin-bottom:4px; letter-spacing:-1px; }
  .stat-label { font-size:12px; color:var(--text2); font-weight:500; }
  .stat-change { font-size:11px; color:var(--green-light); margin-top:4px; font-weight:600; }

  /* TABLE */
  .table-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
  .table-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .table-title { font-size:15px; font-weight:700; }
  .search-wrap { position:relative; }
  .search-input { background:var(--bg3); border:1px solid var(--border2); border-radius:9px;
    padding:9px 14px 9px 36px; color:var(--text); font-family:'Sora',sans-serif; font-size:13px; outline:none; width:220px; transition:all .2s; }
  .search-input:focus { border-color:var(--green); box-shadow:0 0 0 2px var(--green-glow); }
  .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:14px; }
  table { width:100%; border-collapse:collapse; }
  th { padding:10px 22px; text-align:left; font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
  td { padding:14px 22px; font-size:13.5px; border-bottom:1px solid rgba(10,138,97,0.08); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface); }
  .mono { font-family:'JetBrains Mono',monospace; font-size:13px; }
  .thumb { width:52px; height:36px; background:var(--bg3); border-radius:6px; object-fit:cover;
    display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text3); flex-shrink:0; overflow:hidden; }

  /* SETTINGS */
  .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .settings-section { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; }
  .settings-title { font-size:15px; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
  .setting-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); }
  .setting-row:last-child { border-bottom:none; }
  .setting-info { flex:1; }
  .setting-name { font-size:13.5px; font-weight:600; margin-bottom:3px; }
  .setting-desc { font-size:12px; color:var(--text2); }
  .toggle { position:relative; width:46px; height:26px; flex-shrink:0; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; inset:0; background:var(--bg3); border:1px solid var(--border2);
    border-radius:26px; cursor:pointer; transition:.2s; }
  .toggle-slider::before { content:''; position:absolute; height:18px; width:18px; left:3px; bottom:3px;
    background:var(--text3); border-radius:50%; transition:.2s; }
  input:checked + .toggle-slider { background:var(--green); border-color:var(--green); }
  input:checked + .toggle-slider::before { transform:translateX(20px); background:#fff; }

  .storage-option { border:2px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    cursor:pointer; transition:all .15s; margin-bottom:10px; display:flex; align-items:flex-start; gap:12px; }
  .storage-option.selected { border-color:var(--green); background:rgba(10,138,97,0.06); }
  .storage-option-radio { width:18px; height:18px; border-radius:50%; border:2px solid var(--border2);
    flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:.15s; }
  .storage-option.selected .storage-option-radio { border-color:var(--green); background:var(--green); }
  .storage-option.selected .storage-option-radio::after { content:''; width:6px; height:6px; background:#fff; border-radius:50%; }
  .storage-option-title { font-size:13.5px; font-weight:700; margin-bottom:3px; }
  .storage-option-desc { font-size:12px; color:var(--text2); }

  /* PLANS */
  .plans-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .plan-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px 24px;
    position:relative; overflow:hidden; }
  .plan-card.popular { border-color:var(--green); box-shadow:0 0 40px rgba(10,138,97,0.15); }
  .plan-popular-badge { position:absolute; top:0; right:0; background:var(--green); color:#fff;
    font-size:10px; font-weight:800; padding:5px 12px; border-radius:0 var(--radius-lg) 0 var(--radius); letter-spacing:1px; }
  .plan-name { font-size:16px; font-weight:700; margin-bottom:6px; }
  .plan-price { font-size:34px; font-weight:800; letter-spacing:-1px; margin:12px 0; }
  .plan-price sup { font-size:18px; font-weight:600; margin-right:2px; vertical-align:super; }
  .plan-price span { font-size:14px; font-weight:500; color:var(--text2); }
  .plan-desc { font-size:13px; color:var(--text2); margin-bottom:20px; }
  .plan-features { list-style:none; margin-bottom:24px; }
  .plan-features li { display:flex; align-items:center; gap:8px; font-size:13px; padding:7px 0; border-bottom:1px solid rgba(10,138,97,0.08); }
  .plan-features li:last-child { border-bottom:none; }
  .feat-check { color:var(--green-light); font-size:14px; }
  .feat-x { color:var(--text3); font-size:14px; }

  /* ANALYTICS */
  .analytics-grid { display:grid; grid-template-columns:2fr 1fr; gap:20px; }
  .chart-area { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; }
  .chart-bars { display:flex; align-items:flex-end; gap:8px; height:160px; padding-top:10px; }
  .bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { width:100%; border-radius:5px 5px 0 0; transition:all .3s; cursor:pointer; position:relative; min-height:4px; }
  .bar:hover { opacity:0.85; }
  .bar-label { font-size:10px; color:var(--text3); font-weight:600; }
  .bar-val { font-size:11px; color:var(--text2); font-weight:700; }
  .donut-svg { display:block; }
  .progress-bar { height:8px; background:var(--bg3); border-radius:8px; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--green-light)); border-radius:8px; transition:width .5s; }
  .storage-info { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; }

  /* NOTIFICATION */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--border2);
    border-radius:var(--radius); padding:14px 18px; display:flex; align-items:center; gap:10px;
    font-size:13.5px; font-weight:500; box-shadow:0 16px 40px rgba(0,0,0,0.4); z-index:9999;
    animation:slideIn .3s ease; max-width:320px; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

  /* MISC */
  .divider { height:1px; background:var(--border); margin:20px 0; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:60px 20px; color:var(--text2); gap:12px; }
  .empty-icon { font-size:48px; opacity:0.3; }
  .empty-text { font-size:14px; }
  .chip { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px;
    font-size:11px; font-weight:700; }
  .chip-green { background:rgba(10,138,97,0.15); color:var(--green-light); }
  .chip-red { background:rgba(255,71,87,0.12); color:var(--red); }
  .chip-amber { background:rgba(255,165,2,0.12); color:var(--amber); }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg);
    padding:32px; width:480px; box-shadow:0 32px 80px rgba(0,0,0,0.5); }
  .modal-title { font-size:20px; font-weight:700; margin-bottom:6px; }
  .modal-sub { font-size:13px; color:var(--text2); margin-bottom:24px; }
  .modal-actions { display:flex; gap:10px; margin-top:24px; justify-content:flex-end; }

  @media(max-width:900px){
    .record-grid { grid-template-columns:1fr; }
    .stats-grid { grid-template-columns:repeat(2,1fr); }
    .plans-grid { grid-template-columns:1fr; }
    .settings-grid { grid-template-columns:1fr; }
    .sidebar { display:none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ============ MOCK DATA ============
const MOCK_VIDEOS = [
  { id:1, orderId:'ORD-2024-001234', awb:'AWB7891234560', date:'2025-03-24', duration:'02:14', size:'45MB', status:'saved', storage:'local' },

// ============ TOAST ============
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  const icon = type==='success'?'✓':type==='error'?'✗':'ℹ';
  const color = type==='success'?'var(--green-light)':type==='error'?'var(--red)':'var(--blue)';
  return (
    <div className="toast">
      <span style={{color,fontSize:18,fontWeight:800}}>{icon}</span>
      <span>{msg}</span>
    </div>
  );
}

// ============ RECORDING PAGE ============
function RecordingPage({ user, toast }) {
  // ── State ──────────────────────────────────────────────────────────────
  const [orderId,     setOrderId]     = useState('');
  const [awb,         setAwb]         = useState('');
  const [phase,       setPhase]       = useState('idle'); // idle|recording|saving
  const [timer,       setTimer]       = useState(0);
  const [currentTime, setCurrentTime] = useState(new Date());
  const [folderName,  setFolderName]  = useState(localStorage.getItem('vms_folder_name') || '');
  const [lastSaved,   setLastSaved]   = useState('');
  const [savedVideos, setSavedVideos] = useState(MOCK_VIDEOS.slice(0,4));
  const [camError,    setCamError]    = useState('');

  // ── Refs ───────────────────────────────────────────────────────────────
  const videoRef        = useRef(null);   // always mounted, hidden when idle
  const streamRef       = useRef(null);
  const recorderRef     = useRef(null);
  const chunksRef       = useRef([]);
  const timerRef        = useRef(null);
  const clockRef        = useRef(null);
  const folderHandleRef = useRef(null);
  const orderRef        = useRef(null);
  const awbRef          = useRef(null);

  // ── Clock ──────────────────────────────────────────────────────────────
  useEffect(() => {
    clockRef.current = setInterval(() => setCurrentTime(new Date()), 1000);
    // Focus order input on page load
    setTimeout(() => orderRef.current && orderRef.current.focus(), 200);
    return () => clearInterval(clockRef.current);
  }, []);

  // ── Timer ──────────────────────────────────────────────────────────────
  useEffect(() => {
    if (phase === 'recording') {
      timerRef.current = setInterval(() => setTimer(t => t + 1), 1000);
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [phase]);

  // ── Attach/detach stream to video element ──────────────────────────────
  // video element is always in DOM; we show/hide with CSS
  // This guarantees videoRef.current exists when we set srcObject
  useEffect(() => {
    const el = videoRef.current;
    if (!el) return;
    if (phase === 'recording' && streamRef.current) {
      el.srcObject = streamRef.current;
      el.play().catch(() => {});
    } else if (phase === 'idle') {
      el.srcObject = null;
    }
  }, [phase]);

  // ── Select Folder ──────────────────────────────────────────────────────
  const selectFolder = async () => {
    if (!window.showDirectoryPicker) {
      toast('Folder picker requires Chrome or Edge browser', 'error');
      return;
    }
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      folderHandleRef.current = handle;
      setFolderName(handle.name);
      localStorage.setItem('vms_folder_name', handle.name);
      toast(`Folder selected: "${handle.name}"`, 'success');
    } catch(e) {
      if (e.name !== 'AbortError') toast('Folder selection cancelled', 'error');
    }
  };

  // ── Start Camera + Recording ───────────────────────────────────────────
  const startRecording = async (oid) => {
    setCamError('');
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: true
      });
    } catch(e) {
      setCamError('Camera access denied. Click the camera icon in the address bar and allow access, then try again.');
      toast('Camera permission required', 'error');
      return;
    }

    streamRef.current = stream;
    chunksRef.current = [];

    // Start MediaRecorder
    let mimeType = 'video/webm;codecs=vp8,opus';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';

    const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    recorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) chunksRef.current.push(e.data);
    };
    recorder.start(500);
    recorderRef.current = recorder;

    setTimer(0);
    setPhase('recording'); // this triggers useEffect which attaches stream to video

    toast(`Recording started: ${oid}`, 'success');
    // Move focus to AWB after camera starts
    setTimeout(() => awbRef.current && awbRef.current.focus(), 300);
  };

  // ── Stop + Save ────────────────────────────────────────────────────────
  const stopAndSave = (awbVal) => {
    const capturedOrderId = orderId;
    const dur = fmt(timer);
    setPhase('saving');

    const recorder = recorderRef.current;
    if (!recorder || recorder.state === 'inactive') {
      finalise(null, capturedOrderId, awbVal, dur);
      return;
    }

    recorder.onstop = async () => {
      const blob = new Blob(chunksRef.current, { type: 'video/webm' });
      await finalise(blob, capturedOrderId, awbVal, dur);
    };
    recorder.stop();

    // Stop camera tracks
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
  };

  const finalise = async (blob, oid, awbVal, dur) => {
    const filename = `${oid}__${awbVal}__${new Date().toISOString().replace(/[:.]/g,'-')}.webm`;

    if (blob) {
      if (folderHandleRef.current) {
        try {
          const fh = await folderHandleRef.current.getFileHandle(filename, { create: true });
          const w  = await fh.createWritable();
          await w.write(blob);
          await w.close();
          setLastSaved(filename);
          toast(`Saved to "${folderHandleRef.current.name}" — ${filename}`, 'success');
        } catch(e) {
          downloadBlob(blob, filename);
          toast(`Saved as download: ${filename}`, 'success');
        }
      } else {
        downloadBlob(blob, filename);
        toast(`Downloaded: ${filename} — Select a folder to auto-save`, 'success');
      }
    }

    const sizeMB = blob ? `${(blob.size/1024/1024).toFixed(1)}MB` : '—';
    setSavedVideos(prev => [{
      id: Date.now(), orderId: oid, awb: awbVal,
      date: new Date().toISOString().split('T')[0],
      duration: dur, size: sizeMB,
      status: 'saved',
      storage: folderHandleRef.current ? 'local' : 'download'
    }, ...prev].slice(0, 20));

    // Reset everything and refocus Order ID for next order
    setOrderId('');
    setAwb('');
    setTimer(0);
    setPhase('idle');
    chunksRef.current = [];
    recorderRef.current = null;

    setTimeout(() => orderRef.current && orderRef.current.focus(), 200);
  };

  const downloadBlob = (blob, filename) => {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  };

  // ── Input handlers ─────────────────────────────────────────────────────
  const onOrderChange = (val) => {
    if (phase !== 'idle') return;
    setOrderId(val);
    // Auto-trigger when barcode scanner sends Enter or value is long enough
  };

  const onOrderKeyDown = (e) => {
    // Barcode scanners typically append Enter after the barcode
    if (e.key === 'Enter' && orderId.trim().length >= 3 && phase === 'idle') {
      e.preventDefault();
      startRecording(orderId.trim());
    }
  };

  const onAwbChange = (val) => {
    if (phase !== 'recording') return;
    setAwb(val);
  };

  const onAwbKeyDown = (e) => {
    if (e.key === 'Enter' && awb.trim().length >= 3 && phase === 'recording') {
      e.preventDefault();
      stopAndSave(awb.trim());
    }
  };

  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const isIdle      = phase === 'idle';
  const isRecording = phase === 'recording';
  const isSaving    = phase === 'saving';

  return (
    <div>
      {/* ── FOLDER BAR ── */}
      <div style={{
        display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:10,
        padding:'12px 18px', borderRadius:12, marginBottom:18,
        background: folderName ? 'rgba(10,138,97,0.1)' : 'rgba(255,165,2,0.08)',
        border: `1px solid ${folderName ? 'rgba(10,138,97,0.35)' : 'rgba(255,165,2,0.35)'}`
      }}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18}}>{folderName ? '📁' : '⚠️'}</span>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:folderName?'var(--green-light)':'var(--amber)'}}>
              {folderName ? `Save folder: "${folderName}"` : 'No folder selected'}
            </div>
            <div style={{fontSize:11,color:'var(--text2)'}}>
              {folderName
                ? (lastSaved ? `Last saved: ${lastSaved.substring(0,45)}...` : 'Videos will be saved directly to this folder')
                : 'Select a folder — videos will auto-save there every time. Without a folder, files download to your browser.'}
            </div>
          </div>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={selectFolder}>
          {folderName ? '🔄 Change Folder' : '📂 Select Folder'}
        </button>
      </div>

      <div className="record-grid" style={{alignItems:'start'}}>

        {/* ── LEFT: CONTROLS ── */}
        <div className="panel">
          <div className="panel-title">📱 Scan &amp; Record</div>

          {/* Camera error */}
          {camError && (
            <div style={{background:'rgba(255,71,87,0.1)',border:'1px solid rgba(255,71,87,0.3)',
              borderRadius:9,padding:'10px 14px',marginBottom:14,fontSize:12,color:'var(--red)',lineHeight:1.5}}>
              ⚠️ {camError}
            </div>
          )}

          {/* ORDER ID */}
          <div className="scan-field">
            <div className="scan-label">
              <span>① Order ID</span>
              {isRecording && <span className="chip chip-green">✓ Scanned</span>}
              {isIdle && <span style={{fontSize:11,color:'var(--text3)'}}>Scan → press Enter</span>}
            </div>
            <div className="scan-input-wrap">
              <span className="scan-icon">🔍</span>
              <input
                ref={orderRef}
                className={`scan-input${isRecording||isSaving ? ' done' : ''}`}
                placeholder="Scan Order ID barcode or type and press Enter..."
                value={orderId}
                onChange={e => onOrderChange(e.target.value)}
                onKeyDown={onOrderKeyDown}
                disabled={!isIdle}
              />
              {(isRecording||isSaving) && <span className="scan-check">✓</span>}
            </div>
            {isIdle && orderId.length > 0 && orderId.length < 3 && (
              <div style={{fontSize:11,color:'var(--text3)',marginTop:5,paddingLeft:4}}>
                Type full Order ID then press Enter to start recording
              </div>
            )}
            {isIdle && orderId.length >= 3 && (
              <button className="btn btn-primary btn-sm" style={{marginTop:8,width:'100%'}}
                onClick={() => startRecording(orderId.trim())}>
                ▶ Start Recording
              </button>
            )}
          </div>

          {/* AWB */}
          <div className="scan-field">
            <div className="scan-label">
              <span>② AWB Number</span>
              {isSaving && <span className="chip chip-green">✓ Scanned</span>}
              {isRecording && <span style={{fontSize:11,color:'var(--red)',fontWeight:700,animation:'pulse 1s infinite'}}>● Recording...</span>}
            </div>
            <div className="scan-input-wrap">
              <span className="scan-icon">📦</span>
              <input
                ref={awbRef}
                className={`scan-input${isRecording ? ' active' : ''}${isSaving ? ' done' : ''}`}
                placeholder={isRecording ? "Scan AWB barcode or type and press Enter to stop..." : "Waiting for Order ID..."}
                value={awb}
                onChange={e => onAwbChange(e.target.value)}
                onKeyDown={onAwbKeyDown}
                disabled={!isRecording}
              />
              {isSaving && <span className="scan-check">✓</span>}
            </div>
            {isRecording && awb.length >= 3 && (
              <button className="btn btn-danger btn-sm" style={{marginTop:8,width:'100%'}}
                onClick={() => stopAndSave(awb.trim())}>
                ⬛ Stop &amp; Save Video

          </div>

          {/* STATUS CARD */}
          <div className="status-card" style={{marginTop:4}}>
            {[
              { label:'Status',
                value: isSaving ? <span style={{color:'var(--amber)',fontWeight:700}}>💾 Saving...</span>
                  : isRecording ? <span style={{display:'flex',alignItems:'center',gap:6,color:'var(--red)',fontWeight:700}}>

// ============ VIDEOS PAGE ============
function VideosPage({ toast }) {
  const [search, setSearch] = useState('');
  const [videos, setVideos] = useState(MOCK_VIDEOS);
  const [dateFilter, setDateFilter] = useState('');
  const [deleteModal, setDeleteModal] = useState(null);

  const filtered = videos.filter(v =>
    (v.orderId.toLowerCase().includes(search.toLowerCase()) || v.awb.toLowerCase().includes(search.toLowerCase())) &&
    (!dateFilter || v.date === dateFilter)
  );

  const handleDelete = (id) => {
    setVideos(prev => prev.filter(v => v.id !== id));
    toast('Video deleted', 'success');
    setDeleteModal(null);
  };

  return (
    <div>
      <div className="table-wrap">
        <div className="table-header">
          <span className="table-title">All Recordings ({filtered.length})</span>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <input type="date" className="form-input" style={{padding:'8px 12px',fontSize:13,width:'auto'}}
              value={dateFilter} onChange={e=>setDateFilter(e.target.value)} />
            <div className="search-wrap">
              <span className="search-icon">🔍</span>
              <input className="search-input" placeholder="Search Order ID or AWB..."
                value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
          </div>
        </div>
        {filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">🎬</div>
            <div className="empty-text">No recordings found</div>
          </div>
        ) : (
          <table>
            <thead><tr>
              <th>Video</th><th>Order ID</th><th>AWB</th><th>Date</th><th>Duration</th><th>Size</th><th>Storage</th><th>Actions</th>
            </tr></thead>
            <tbody>
              {filtered.map(v => (
                <tr key={v.id}>
                  <td><div className="thumb">🎬</div></td>
                  <td className="mono" style={{color:'var(--green-light)'}}>{v.orderId}</td>
                  <td className="mono">{v.awb}</td>
                  <td style={{color:'var(--text2)'}}>{v.date}</td>
                  <td>{v.duration}</td>
                  <td>{v.size}</td>
                  <td><span className="chip chip-green">{v.storage}</span></td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-secondary btn-sm" onClick={()=>toast('Download started','success')}>↓</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>setDeleteModal(v.id)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {deleteModal && (
        <div className="modal-backdrop" onClick={()=>setDeleteModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Delete Recording?</div>
            <div className="modal-sub">This action cannot be undone. The video file will be permanently deleted.</div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={()=>setDeleteModal(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={()=>handleDelete(deleteModal)}>Delete Video</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    { id:'dashboard', icon:'🏠', label:'Dashboard' },
    { id:'record', icon:'🎬', label:'Record Video' },
    { id:'videos', icon:'📁', label:'My Videos' },
    { id:'analytics', icon:'📊', label:'Analytics' },
    { id:'settings', icon:'⚙️', label:'Settings' },
    { id:'plans', icon:'💎', label:'Upgrade' },
  ];

  const pageTitle = {
    dashboard:'Dashboard', record:'Record Video', videos:'My Videos',
    analytics:'Analytics', settings:'Settings', plans:'Plans & Pricing', admin:'Admin Panel'
  };

  if (!user) return <AuthPage onLogin={(u) => { setUser(u); setPage('dashboard'); }} />;

  return (
    <div className="app">
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-badge">📦</div>
          <div>
            <div className="logo-name">Zeespares</div>
            <div className="logo-tag">VMS</div>
          </div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-section-title">Navigation</div>
            {navItems.map(n => (
              <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
                <span className="nav-icon">{n.icon}</span>
                <span>{n.label}</span>
                {n.id==='plans' && user.plan==='free' && <span className="badge badge-amber" style={{fontSize:10,padding:'2px 6px',marginLeft:'auto'}}>↑</span>}
              </div>
            ))}
          </div>
        </div>
        <div className="sidebar-bottom">
          <div className="user-pill" onClick={()=>setPage('settings')}>
            <div className="user-avatar">{user.name[0].toUpperCase()}</div>
            <div>
              <div className="user-name">{user.name.split(' ')[0]}</div>
              <div className="user-plan">{user.plan.toUpperCase()} PLAN</div>
            </div>
          </div>
          <button className="btn btn-ghost" style={{width:'100%',marginTop:8,fontSize:12,color:'var(--text3)'}}
            onClick={()=>setUser(null)}>Sign Out</button>
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{pageTitle[page]}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>
              {new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
            </div>
          </div>
          <div className="topbar-actions">
            {page==='record' && (
              <span className="badge badge-green">● Camera Ready</span>
            )}
            <span className={`badge ${user.plan==='premium'?'badge-amber':user.plan==='pro'?'badge-green':'badge-blue'}`}>
              {user.plan.toUpperCase()}
            </span>
            {user.role==='admin' && <span className="badge badge-red">ADMIN</span>}
            <button className="btn btn-secondary btn-sm" onClick={()=>toast('Notifications: all clear ✓','success')}>🔔</button>
          </div>
        </div>
        <div className="content">
          {page==='dashboard' && <Dashboard user={user} navigate={setPage} />}
          {page==='record' && <RecordingPage user={user} toast={toast} />}
          {page==='videos' && <VideosPage toast={toast} />}
          {page==='analytics' && <AnalyticsPage />}
          {page==='settings' && <SettingsPage user={user} toast={toast} />}
          {page==='plans' && <PlansPage user={user} toast={toast} />}
          {page==='admin' && <AdminPage toast={toast} />}
        </div>
      </div>

      {toastData && <Toast key={toastData.key} msg={toastData.msg} type={toastData.type} onClose={()=>setToastData(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
